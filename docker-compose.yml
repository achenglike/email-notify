services:
  email-notify:
    build: .
    container_name: email-notify
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    mem_limit: 96m
    memswap_limit: 96m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp
